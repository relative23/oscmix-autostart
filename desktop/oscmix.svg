<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- oscmix-autostart application icon: three mixer faders -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="#20242c"/>
  <rect x="16" y="16" width="224" height="224" rx="48" fill="none"
        stroke="#3a4150" stroke-width="4"/>
  <!-- fader tracks -->
  <rect x="72" y="60" width="8" height="136" rx="4" fill="#3a4150"/>
  <rect x="124" y="60" width="8" height="136" rx="4" fill="#3a4150"/>
  <rect x="176" y="60" width="8" height="136" rx="4" fill="#3a4150"/>
  <!-- fader caps -->
  <g stroke="#20242c" stroke-width="2">
    <rect x="56" y="88" width="40" height="26" rx="6" fill="#e8e6e3"/>
    <rect x="108" y="132" width="40" height="26" rx="6" fill="#e8e6e3"/>
    <rect x="160" y="104" width="40" height="26" rx="6" fill="#e8e6e3"/>
  </g>
  <!-- cap center lines -->
  <rect x="60" y="99" width="32" height="4" rx="2" fill="#e85d3d"/>
  <rect x="112" y="143" width="32" height="4" rx="2" fill="#e85d3d"/>
  <rect x="164" y="115" width="32" height="4" rx="2" fill="#e85d3d"/>
</svg>
